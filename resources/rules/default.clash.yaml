mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

dns:
  enable: true
  ipv6: false
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fallback:
    - https://doh-pure.onedns.net/dns-query
    - https://ada.openbld.net/dns-query
    - https://223.5.5.5/dns-query
    - https://223.6.6.6/dns-query
  fallback-filter:
    geoip: true
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32

proxies:

proxy-groups:
  - { name: "节点选择", type: select, proxies: ["自动选择", "故障转移", "手动切换", "DIRECT", "REJECT"] }
  - { name: "手动切换", type: select, proxies: [] }
  - { name: "自动选择", type: url-test, proxies: [], url: "http://www.gstatic.com/generate_204", interval: 300, tolerance: 100 }
  - { name: "故障转移", type: fallback, proxies: [], url: "http://www.gstatic.com/generate_204", interval: 300 }
  - { name: "AI服务", type: select, proxies: ["节点选择", "自动选择", "故障转移", "DIRECT"] }
  - { name: "流媒体", type: select, proxies: ["节点选择", "自动选择", "故障转移", "DIRECT"] }
  - { name: "社交媒体", type: select, proxies: ["节点选择", "自动选择", "故障转移", "DIRECT"] }
  - { name: "微软服务", type: select, proxies: ["节点选择", "自动选择", "DIRECT"] }
  - { name: "苹果服务", type: select, proxies: ["DIRECT", "节点选择", "自动选择"] }
  - { name: "广告拦截", type: select, proxies: ["REJECT", "DIRECT"] }
  - { name: "漏网之鱼", type: select, proxies: ["节点选择", "DIRECT"] }

